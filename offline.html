<!DOCTYPE html>
<html lang="ms">
<head>

<title>QRSedekah - Tiada Sambungan</title>
<style>

  body{background:#062B44;color:#fff;font-family:system-ui,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;text-align:center}

  .icon{font-size:52px;margin-bottom:16px}

  p{color:rgba(255,255,255,0.45);font-size:14px;line-height:1.7;max-width:280px;margin:0 auto 28px}
  button{background:linear-gradient(135deg,#5DF8D8,#6FD1D7);color:#062B44;border:none;padding:14px 36px;border-radius:50px;font-size:15px;font-weight:700;cursor:pointer}
</style>
</head>
<body>
<div>
  <div class="logo">QR<span>Sedekah</span></div>
  <div class="icon">📡</div>
  <h2>Tiada Sambungan Internet</h2>
  <p>Aplikasi memerlukan sambungan untuk memuatkan data terkini. Sila semak WiFi atau data mudah alih anda.</p>
  <button onclick="window.location.reload()">Cuba Semula</button>
