name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 1.0.1)'
        required: false
        default: '1.0.0'

env:
  ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Accept Android SDK licences
        run: |
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "build-tools;34.0.0" "platforms;android-34" 2>/dev/null || true

      - name: Create debug keystore (prevents interactive prompt)
        run: |
          mkdir -p ~/.android
          keytool -genkeypair -v \
            -keystore ~/.android/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US" || true

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Build APK
        run: echo "" | bubblewrap build --skipPwaValidation
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

      - name: Find built files
        run: find . -name "*.apk" -o -name "*.aab" 2>/dev/null | grep -v node_modules || echo "No APK found"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: qrsedekah-${{ github.event.inputs.version || '1.0.0' }}-debug
          path: |
            **/*.apk
            **/*.aab
          exclude: |
            node_modules/**
          retention-days: 30
          if-no-files-found: warn
