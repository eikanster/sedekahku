name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 1.0.1)'
        required: false
        default: '1.0.0'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Accept Android SDK licences
        run: yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Install Android build tools
        run: $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "build-tools;34.0.0" "platforms;android-34"

      - name: Build debug APK
        run: bubblewrap build --skipPwaValidation
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}

      - name: Find APK files
        run: find . -name "*.apk" -type f 2>/dev/null || echo "No APK found yet"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: qrsedekah-${{ github.event.inputs.version || '1.0.0' }}-debug
          path: |
            app/build/outputs/apk/**/*.apk
            *.apk
          retention-days: 30
          if-no-files-found: warn
