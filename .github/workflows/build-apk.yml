name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 1.0.1)'
        required: false
        default: '1.0.0'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Accept Android SDK licences
        run: |
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "build-tools;34.0.0" "platforms;android-34" 2>/dev/null || true

      - name: Create TWA Android project
        run: |
          mkdir -p twa/app/src/main/res/values
          mkdir -p twa/app/src/main/res/mipmap-hdpi
          mkdir -p twa/gradle/wrapper

          cat > twa/settings.gradle << 'EOF'
          rootProject.name = "QRSedekah"
          include ':app'
          EOF

          cat > twa/build.gradle << 'EOF'
          buildscript {
            repositories { google(); mavenCentral() }
            dependencies { classpath 'com.android.tools.build:gradle:8.1.4' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          cat > twa/gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx2048m
          EOF

          cat > twa/gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.1.1-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

          cat > twa/app/build.gradle << 'EOF'
          apply plugin: 'com.android.application'
          android {
            compileSdkVersion 34
            defaultConfig {
              applicationId "com.qrsedekah.app"
              minSdkVersion 21
              targetSdkVersion 34
              versionCode ${{ github.event.inputs.version != '' && 1 || 1 }}
              versionName "${{ github.event.inputs.version || '1.0.0' }}"
            }
            buildTypes {
              debug { minifyEnabled false }
            }
            compileOptions {
              sourceCompatibility JavaVersion.VERSION_1_8
              targetCompatibility JavaVersion.VERSION_1_8
            }
          }
          dependencies {
            implementation 'androidx.appcompat:appcompat:1.6.1'
            implementation 'com.google.androidbrowserhelper:androidbrowserhelper:2.5.0'
          }
          EOF

          cat > twa/app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
            package="com.qrsedekah.app">
            <uses-permission android:name="android.permission.INTERNET"/>
            <application
              android:allowBackup="true"
              android:label="@string/app_name"
              android:theme="@style/Theme.AppCompat.NoActionBar">
              <activity
                android:name="com.google.androidbrowserhelper.trusted.LauncherActivity"
                android:exported="true">
                <meta-data
                  android:name="android.support.customtabs.trusted.DEFAULT_URL"
                  android:value="@string/default_url"/>
                <intent-filter android:autoVerify="true">
                  <action android:name="android.intent.action.MAIN"/>
                  <category android:name="android.intent.category.LAUNCHER"/>
                </intent-filter>
                <intent-filter android:autoVerify="true">
                  <action android:name="android.intent.action.VIEW"/>
                  <category android:name="android.intent.category.DEFAULT"/>
                  <category android:name="android.intent.category.BROWSABLE"/>
                  <data android:scheme="https" android:host="sedekahku.pages.dev"/>
                </intent-filter>
              </activity>
            </application>
          </manifest>
          EOF

          cat > twa/app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
            <string name="app_name">QRSedekah</string>
            <string name="default_url">https://sedekahku.pages.dev/</string>
          </resources>
          EOF

          # Download gradle wrapper
          curl -sL "https://raw.githubusercontent.com/gradle/gradle/v8.1.1/gradlew" -o twa/gradlew
          chmod +x twa/gradlew
          curl -sL "https://github.com/gradle/gradle/raw/v8.1.1/gradle/wrapper/gradle-wrapper.jar" \
            -o twa/gradle/wrapper/gradle-wrapper.jar

      - name: Build debug APK
        working-directory: twa
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: qrsedekah-${{ github.event.inputs.version || '1.0.0' }}-debug
          path: twa/app/build/outputs/apk/debug/*.apk
          retention-days: 30
